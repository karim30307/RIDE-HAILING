<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride-Hailing Admin Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 {
            color: #1a237e;
            margin-top: 0;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #757575;
            margin-bottom: 20px;
            font-size: 14px;
        }
        #map {
            height: 480px;
            width: 100%;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            margin-bottom: 30px;
            z-index: 1;
        }
        h3 {
            color: #212121;
            margin-bottom: 15px;
            font-size: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 14px 18px;
            text-align: left;
        }
        th {
            background-color: #1a237e; /* Matching your beautiful purple/dark blue theme */
            color: white;
            font-weight: 600;
            font-size: 15px;
        }
        tr:border-bottom {
            border-bottom: 1px solid #eeeeee;
        }
        td {
            font-size: 14px;
            color: #424242;
        }
        .role-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }
        .role-passenger {
            background-color: #fce4ec;
            color: #c2185b;
        }
        .role-driver {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        .ip-text {
            font-family: 'Courier New', Courier, monospace;
            color: #0d47a1;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h2>🚖 Ride-Hailing Live Tracking Dashboard</h2>
        <div class="subtitle">Admin Control Panel — Monitoring active driver and passenger requests.</div>
        
        <div id="map"></div>

        <h3>Check-in Log Records</h3>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>User Role</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                    <th>IP Address</th>
                    <th>Time Captured</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                </tbody>
        </table>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Set view perfectly targeting your Universiti Utara Malaysia layout coordinates
        const map = L.map('map').setView([6.4638, 100.5039], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let activeMarkers = {};

        function fetchLiveSystemData() {
            fetch('/api/locations')
                .then(res => res.json())
                .then(users => {
                    const tableBody = document.getElementById('logTableBody');
                    tableBody.innerHTML = ''; // Fresh UI table render cycle

                    users.forEach(user => {
                        const { driver_id, user_role, latitude, longitude, ip_address, timestamp } = user;
                        const role = user_role || 'Driver';

                        // 1. Plot pins or shift existing ones smoothly on the campus grid
                        if (activeMarkers[driver_id]) {
                            activeMarkers[driver_id].setLatLng([latitude, longitude]);
                        } else {
                            activeMarkers[driver_id] = L.marker([latitude, longitude])
                                .addTo(map)
                                .bindPopup(`<b>User:</b> ${driver_id}<br><b>Role:</b> ${role}<br><b>IP:</b> ${ip_address}`);
                        }

                        // 2. Set dynamic color classes for roles (Passenger vs Driver)
                        const badgeClass = (role.toLowerCase() === 'passenger') ? 'role-passenger' : 'role-driver';

                        // 3. Append data row with captured client IP values
                        const tableRow = `
                            <tr>
                                <td><b>${driver_id}</b></td>
                                <td><span class="role-badge ${badgeClass}">${role}</span></td>
                                <td>${latitude.toFixed(4)}</td>
                                <td>${longitude.toFixed(4)}</td>
                                <td class="ip-text">${ip_address || '127.0.0.1'}</td>
                                <td>${timestamp}</td>
                            </tr>
                        `;
                        tableBody.innerHTML += tableRow;
                    });
                })
                .catch(err => console.error('Dashboard synchronization error:', err));
        }

        // Continually refresh data grid updates every 5 seconds
        setInterval(fetchLiveSystemData, 5000);
        fetchLiveSystemData(); // Initial execution run
    </script>
</body>
</html>
